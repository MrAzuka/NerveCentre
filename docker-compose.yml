services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monitoring
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # persists the model so it doesn't re-download on restart

volumes:
  ollama_data: